name: weekly_report
description: 生成每周工作周报，按项目汇总工时
version: 1.0.0
author: 用户自定义

triggers:
  - pattern: "生成.*周报"
    action: generate_weekly
  - pattern: "本周周报"
    action: generate_weekly

memory:
  - key: weekly_report_format
    description: 周报输出格式偏好
    default:
      group_by: "project"
      include_hours_detail: true
      include_next_week_plan: true
      summary_max_projects: 10

actions:
  generate_weekly:
    prompt: |
      读取本周（周一至周五）所有工作日志。
      
      按项目聚合，计算每个项目的总工时，提取主要工作内容。
      
      模板：
      ## 工作周报 - {年份}年第{week}周（{start_date} - {end_date}）
      
      ### 各项目工时汇总
      | 项目 | 总工时 | 主要工作 |
      |------|--------|----------|
      {for each project, top by hours}
      | {project} | {total_hours}h | {top_contents} |
      {end}
      
      ### 本周重点工作
      1. **{top_project}**：{key_achievement}
      
      ### 下周计划
      - [ ] 

help: |
  使用示例：
  - "生成本周周报"
  - "周报按天分组"
